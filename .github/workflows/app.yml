name: App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-lockfiles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check for individual package lockfiles
        run: |
          if ls app/pnpm-lock.yaml curriculum/pnpm-lock.yaml interpreters/pnpm-lock.yaml 2>/dev/null; then
            echo "❌ Error: Individual package lockfiles detected"
            echo "Only the root pnpm-lock.yaml should exist in a monorepo"
            echo "Run 'rm app/pnpm-lock.yaml curriculum/pnpm-lock.yaml interpreters/pnpm-lock.yaml' to fix"
            exit 1
          fi
          echo "✅ No individual package lockfiles found"

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate content
        working-directory: app
        run: pnpm run content:generate

      - name: Generate exercise cache
        working-directory: app
        run: pnpm run exercise-cache:generate

      - name: Generate concept cache
        working-directory: app
        run: pnpm run concept-cache:generate

      - name: Generate icon types
        working-directory: app
        run: pnpm run icons:generate

      - name: Generate icon cache
        working-directory: app
        run: pnpm run icon-cache:generate

      - name: Run typecheck
        working-directory: app
        run: npx tsc --noEmit

  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        working-directory: app
        run: pnpm run format:check

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate icon types
        working-directory: app
        run: pnpm run icons:generate

      - name: Generate icon cache
        working-directory: app
        run: pnpm run icon-cache:generate

      - name: Run linter
        working-directory: app
        run: pnpm run lint

  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate content cache
        working-directory: app
        run: pnpm run content:generate

      - name: Generate exercise cache
        working-directory: app
        run: pnpm run exercise-cache:generate

      - name: Generate concept cache
        working-directory: app
        run: pnpm run concept-cache:generate

      - name: Generate icon types
        working-directory: app
        run: pnpm run icons:generate

      - name: Generate icon cache
        working-directory: app
        run: pnpm run icon-cache:generate

      - name: Run unit tests
        working-directory: app
        run: pnpm run test --ci

  e2e-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate content
        working-directory: app
        run: pnpm run content:generate

      - name: Generate exercise cache
        working-directory: app
        run: pnpm run exercise-cache:generate

      - name: Generate concept cache
        working-directory: app
        run: pnpm run concept-cache:generate

      - name: Generate icon types
        working-directory: app
        run: pnpm run icons:generate

      - name: Generate icon cache
        working-directory: app
        run: pnpm run icon-cache:generate

      - name: Install Playwright browsers
        working-directory: app
        run: pnpm exec playwright install --with-deps chromium

      - name: Configure local.jiki.io DNS
        run: echo "127.0.0.1 local.jiki.io" | sudo tee -a /etc/hosts

      - name: Run Playwright E2E tests
        working-directory: app
        run: pnpm test:e2e
        env:
          CI: true
          # Cloudflare's documented "always passes (invisible)" test site key,
          # so Turnstile resolves immediately in CI without a real challenge.
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 7

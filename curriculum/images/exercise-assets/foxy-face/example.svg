<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
<rect width="100" height="100" fill="#DDDDDD"/>
<!-- White inner ears -->
<polygon points="10,40 5,60 50,95" fill="white"/>
<polygon points="90,40 95,60 50,95" fill="white"/>
<!-- Left ear -->
<polygon points="10,40 10,5 50,40" fill="#E07A10"/>
<!-- Right ear -->
<polygon points="90,40 90,5 50,40" fill="#E07A10"/>
<!-- Left face -->
<polygon points="50,30 50,95 10,40" fill="#FF8A14"/>
<!-- Right face -->
<polygon points="50,30 50,95 90,40" fill="#FF8A14"/>
<!-- Nose top -->
<polygon points="40,90 50,85 60,90" fill="#45413C"/>
<!-- Nose bottom -->
<polygon points="50,95 40,90 60,90" fill="#45413C"/>
</svg>
